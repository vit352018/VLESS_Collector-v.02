name: Collect and Test VPN Configs

on:
  schedule:
    - cron: "0,15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          PYTHONUNBUFFERED: "1"
          YANDEX_TOKEN: ${{ secrets.YANDEX_TOKEN }}
          YANDEX_LOGIN: ${{ secrets.YANDEX_LOGIN }}
          YANDEX_PASS: ${{ secrets.YANDEX_PASS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python src/main.py

      - name: Show result
        if: always()
        run: |
          echo "=== VLESS_WORKING.txt ==="
          head -6 output/VLESS_WORKING.txt 2>/dev/null || echo "not created"
          echo "=== RU_BYPASS.txt ==="
          head -6 output/RU_BYPASS.txt 2>/dev/null || echo "not created"
          echo "=== Stats ==="
          python3 -c "
          import json, pathlib
          f = pathlib.Path('output/stats.json')
          if f.exists():
              s = json.loads(f.read_text())
              print('Working:', s['total_working'], '| TLS:', s['tls_confirmed'])
              p = s['by_protocol']
              print('RU Bypass:', p.get('ru_bypass',0), '| VLESS:', p.get('vless',0))
          " 2>/dev/null || true

      - name: Commit output files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
